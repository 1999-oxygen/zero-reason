apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: omnivision-backend
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/ingress-status: all
spec:
  template:
    metadata:
      annotations:
        # Auto-scale settings
        autoscaling.knative.dev/minScale: '0'  # Scale to zero when not in use (FREE!)
        autoscaling.knative.dev/maxScale: '10' # Max 10 instances
        # CPU allocation
        run.googleapis.com/cpu-throttling: 'true'
        # Execution environment
        run.googleapis.com/execution-environment: gen2
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      serviceAccountName: PROJECT_NUMBER-compute@developer.gserviceaccount.com
      containers:
      - image: gcr.io/PROJECT_ID/omnivision-backend:latest
        ports:
        - name: http1
          containerPort: 8000
        env:
        - name: PORT
          value: '8000'
        - name: GOOGLE_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: GOOGLE_CLIENT_ID
              key: latest
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: JWT_SECRET
              key: latest
        - name: ENVIRONMENT
          value: 'production'
        resources:
          limits:
            cpu: '1000m'      # 1 CPU
            memory: '512Mi'   # 512 MB RAM
        # Volume mount for persistent database
        volumeMounts:
        - name: data
          mountPath: /app/data
      volumes:
      - name: data
        emptyDir: {}  # For now, use emptyDir. Upgrade to Cloud Storage for persistence
  traffic:
  - percent: 100
    latestRevision: true
